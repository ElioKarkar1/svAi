name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build + publish (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: svAi ${{ github.ref_name }}
          releaseBody: |
            svAi desktop app build.

            Notes:
            - Users must install MSYS2 UCRT64 + Verilator toolchain for build/run.
            - See README for setup instructions.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Remove sha256:* assets (cleanup)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const assets = rel.data.assets || [];
            const doomed = assets.filter(a => (a.name || '').startsWith('sha256:'));
            core.info(`Found ${doomed.length} sha256:* assets`);
            for (const a of doomed) {
              core.info(`Deleting asset: ${a.name} (${a.id})`);
              await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
            }
